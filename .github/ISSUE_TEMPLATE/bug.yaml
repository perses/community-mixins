name: 🐞 Bug
description: Report a bug related to Perses community mixins
labels: ["kind/bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        **Note:** This repository is about Perses community mixins. If you have a bug related to the Perses operator, please file it at [perses/perses-operator](https://github.com/perses/perses-operator). For Perses itself, go to [perses/perses](https://github.com/perses/perses).
  - type: checkboxes
    attributes:
      label: Is there an existing issue for this?
      description: |
        Before filing a bug, please search through [existing bugs](https://github.com/perses/community-mixins/issues?q=is%3Aopen+is%3Aissue+label%3Akind%2Fbug).
      options:
        - label: I have searched the existing issues
          required: true
  - type: textarea
    attributes:
      label: What happened?
      description: A concise description of what you're experiencing.
      value: |
        ## Description

        ## Steps to Reproduce

        ## Expected Result

        ## Actual Result
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Component(s)
      description: Select which area(s) of the project this bug relates to.
      multiple: true
      options:
        - Dashboards
        - Panels
        - Rules / Alerts
        - Build / Tooling
        - Other (please comment)
    validations:
      required: true
  - type: textarea
    attributes:
      label: Perses Version
      description: |
        Provide the Perses version used.
        This will be automatically formatted into code, so no need for backticks.
      render: shell
    validations:
      required: false
  - type: dropdown
    attributes:
      label: How did you install Perses?
      description: Select the method you used to install Perses.
      options:
        - Binary
        - Docker/Podman
        - Perses Helm Chart
        - Perses Operator (Helm)
        - Perses Operator (Manifests)
        - Other (please comment)
    validations:
      required: false
  - type: textarea
    attributes:
      label: Perses Operator Version
      description: |
        If using the Perses Operator, provide the version.
        This will be automatically formatted into code, so no need for backticks.
      render: shell
    validations:
      required: false
  - type: textarea
    attributes:
      label: Go Version
      description: |
        Paste the output of `go version`.
        This will be automatically formatted into code, so no need for backticks.
      render: shell
    validations:
      required: false
  - type: textarea
    attributes:
      label: Relevant logs or output
      description: |
        Please provide any relevant log output or error messages.
        This will be automatically formatted into code, so no need for backticks.
      render: shell
    validations:
      required: false
  - type: textarea
    attributes:
      label: Anything else?
      description: |
        Links? References? Anything that will give us more context about the issue you are encountering!

        Tip: You can attach images or any other relevant log files by clicking this area to highlight it and then dragging files in.
    validations:
      required: false
